name: Sincronizar placares

on:
  schedule:
    # 4x ao dia (horário UTC) = 00h, 06h, 12h, 18h UTC -> 21h, 03h, 09h, 15h em Brasília.
    - cron: "0 */6 * * *"
  workflow_dispatch: {}   # permite rodar manualmente pelo botão "Run workflow"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências
        working-directory: sync
        run: npm install --no-audit --no-fund

      - name: Rodar sincronizador
        working-directory: sync
        run: node sync.js
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
